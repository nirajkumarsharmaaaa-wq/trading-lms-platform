{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Courses</h2>
        <a href="{{ url_for('add_course') }}" class="btn btn-success">
            <i class="bi bi-plus-circle me-2"></i>Add New Course
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Type</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for course in courses %}
                    <tr>
                        <td>{{ course.id }}</td>
                        <td><strong>{{ course.title }}</strong></td>
                        <td><span class="badge bg-secondary">{{ course.content_type }}</span></td>
                        <td class="text-end">
                            <a href="{{ url_for('edit_course', course_id=course.id) }}" class="btn btn-sm btn-outline-primary me-2">
                                <i class="bi bi-pencil"></i> Edit Curriculum
                            </a>
    
                            <a href="{{ url_for('delete_course', id=course.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this course permanently?');">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">No courses yet. Click "Add New Course" to start!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
