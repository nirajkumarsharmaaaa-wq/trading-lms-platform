{% extends "base.html" %}

{% block content %}
<div class="container-fluid max-w-4xl mx-auto py-5 text-center">
    <div class="card shadow border-0 mx-auto" style="max-width: 500px;">
        <div class="card-body p-5">
            <h3 class="mb-3">Complete Your Purchase</h3>
            <h5 class="text-muted">{{ course.title }}</h5>
            <h2 class="text-success my-4">₹{{ course.price }}</h2>
            
            <button id="rzp-button1" class="btn btn-primary btn-lg w-100 mb-3">Pay securely with Razorpay</button>
            <p class="small text-muted"><i class="bi bi-shield-lock me-1"></i> Supports UPI, Cards, and Netbanking</p>
            
            <a href="{{ url_for('dashboard') }}" class="text-decoration-none text-muted small">Cancel and return to dashboard</a>
        </div>
    </div>
</div>

<form action="{{ url_for('verify_payment') }}" method="POST" id="razorpay-form" style="display: none;">
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
    <input type="hidden" name="razorpay_signature" id="razorpay_signature">
    <input type="hidden" name="course_id" value="{{ course.id }}">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ key_id }}", // Passed from backend
        "amount": "{{ order.amount }}", // Passed from backend order
        "currency": "INR",
        "name": "My LMS Platform",
        "description": "Purchase: {{ course.title }}",
        "order_id": "{{ order.id }}", // The Order ID generated by the backend
        "handler": function (response){
            // On success, populate the hidden form and submit it to Python
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('razorpay-form').submit();
        },
        "prefill": {
            "name": "{{ current_user.name }}",
            "email": "{{ current_user.email }}"
        },
        "theme": {
            "color": "#0d6efd" // Matches Bootstrap primary color
        }
    };
    var rzp1 = new Razorpay(options);
    
    // Open the Razorpay popup when the user clicks the button
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
</script>
{% endblock %}
